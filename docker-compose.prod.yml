# Production stack — do not use for local development.
# Usage:
#   cp .env.production.example .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#   ./deploy/tag_release.sh   # tag ai-employee-os-backend:prod-<sha> for rollback
#
# Optional profiles (see docs/OPS_RUNBOOK.md):
#   --profile tls     nginx TLS terminator on :443 (publish only 443; bind API to 127.0.0.1)
#   --profile backup  daily pg_dump loop into volume backend_backups
#
# Migrations (recommended for scaled API):
#   docker compose -f docker-compose.prod.yml --env-file .env.production run --rm backend \
#     python /app/docker/migrate_with_lock.py
# then set RUN_MIGRATIONS_ON_STARTUP=false on API replicas.
# Single-replica default may keep RUN_MIGRATIONS_ON_STARTUP=true (advisory lock safe).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ai-employee-os-backend:prod
    container_name: ai-employee-backend-prod
    restart: always
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      # Prefer one-shot migrate for multi-replica; advisory lock protects if true.
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-false}
      TELEGRAM_INLINE_POLLING: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
      # Edge TLS terminates outside the docker network; MinIO stays plain inside.
      MINIO_SECURE: "false"
    # With --profile tls: set API_HOST_BIND=127.0.0.1 (or drop this publish) so only edge :443 is public.
    ports:
      - "${API_HOST_BIND:-0.0.0.0}:${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ai-employee-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    mem_limit: 1g
    cpus: 1.0
    volumes:
      - backend_backups:/app/backups
      - ${AGENCY_ARCHIVE_PATH}:/data/agency_archive:ro

  telegram:
    image: ai-employee-os-backend:prod
    container_name: ai-employee-telegram-prod
    restart: always
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS_ON_STARTUP: "false"
      TELEGRAM_ENABLED: "true"
      TELEGRAM_INLINE_POLLING: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
    command: ["python", "-m", "app.adapters.telegram.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ai-employee-prod
    mem_limit: 512m
    cpus: 0.5

  postgres:
    image: postgres:16-alpine
    container_name: ai-employee-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - ai-employee-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 1g
    cpus: 1.0

  redis:
    image: redis:7-alpine
    container_name: ai-employee-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    networks:
      - ai-employee-prod
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 256m
    cpus: 0.5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: ai-employee-qdrant-prod
    restart: always
    environment:
      # When set, must match backend QDRANT_API_KEY.
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - qdrant_prod_data:/qdrant/storage
    networks:
      - ai-employee-prod
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 512m
    cpus: 0.5

  minio:
    # Pinned release tag (not :latest). Edge TLS is external to this network.
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: ai-employee-minio-prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_prod_data:/data
    networks:
      - ai-employee-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 512m
    cpus: 0.5

  # Optional TLS terminator. Enable: docker compose ... --profile tls up -d
  # When active: set API_HOST_BIND=127.0.0.1 (or remove backend ports) — publish only 443.
  # Certs: ./deploy/certs/fullchain.pem + privkey.pem (or TLS_CERTS_DIR). See docs/OPS_RUNBOOK.md.
  edge:
    profiles: ["tls"]
    image: nginx:1.27-alpine
    container_name: ai-employee-edge-prod
    restart: always
    ports:
      - "${TLS_HTTPS_PORT:-443}:443"
      - "${TLS_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERTS_DIR:-./deploy/certs}:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-employee-prod
    mem_limit: 128m
    cpus: 0.25

  # Optional daily Postgres backup loop. Enable: docker compose ... --profile backup up -d
  # Host crontab alternative: docker compose run --rm backup (see docs/OPS_RUNBOOK.md).
  backup:
    profiles: ["backup"]
    image: ai-employee-os-backend:prod
    container_name: ai-employee-backup-prod
    restart: always
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      RUN_MIGRATIONS_ON_STARTUP: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    entrypoint: ["/bin/sh", "/backup_loop.sh"]
    volumes:
      - ./deploy/backup_loop.sh:/backup_loop.sh:ro
      - backend_backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-employee-prod
    mem_limit: 256m
    cpus: 0.25

networks:
  ai-employee-prod:
    driver: bridge
    name: ai-employee-prod

volumes:
  postgres_prod_data:
  redis_prod_data:
  qdrant_prod_data:
  minio_prod_data:
  backend_backups:
