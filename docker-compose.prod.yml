# Production stack — do not use for local development.
# Usage:
#   cp .env.production.example .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ai-employee-os-backend:prod
    container_name: ai-employee-backend-prod
    restart: always
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS_ON_STARTUP: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - ai-employee-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - backend_backups:/app/backups
      - ${AGENCY_ARCHIVE_PATH}:/data/agency_archive:ro

  postgres:
    image: postgres:16-alpine
    container_name: ai-employee-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - ai-employee-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ai-employee-redis-prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks:
      - ai-employee-prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: ai-employee-qdrant-prod
    restart: always
    volumes:
      - qdrant_prod_data:/qdrant/storage
    networks:
      - ai-employee-prod

  minio:
    image: minio/minio:latest
    container_name: ai-employee-minio-prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_prod_data:/data
    networks:
      - ai-employee-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  ai-employee-prod:
    driver: bridge
    name: ai-employee-prod

volumes:
  postgres_prod_data:
  redis_prod_data:
  qdrant_prod_data:
  minio_prod_data:
  backend_backups:
