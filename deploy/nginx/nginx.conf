# TLS edge terminator for AI Employee OS (prod compose profile `tls`).
# Mount certs at /etc/nginx/certs/ (fullchain.pem + privkey.pem by default).
# Override paths via TLS_CERT_FILE / TLS_KEY_FILE only if you customize this file.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # Upstream is the compose service name `backend` on the prod network.
    upstream ai_employee_backend {
        server backend:8000;
    }

    # Optional HTTP → HTTPS redirect (publish host :80 if desired).
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        # Default paths when mounting ./deploy/certs (or Let's Encrypt live dir).
        # Replace with fullchain/privkey from Let's Encrypt or your CA.
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        location / {
            proxy_pass http://ai_employee_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
        }
    }
}
